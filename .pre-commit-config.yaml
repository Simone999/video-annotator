repos:
  - repo: local
    hooks:
      - id: repo-format-check
        name: repo format check
        entry: make format-check
        language: system
        pass_filenames: false
      - id: repo-lint
        name: repo lint
        entry: make lint
        language: system
        pass_filenames: false
      - id: repo-typecheck
        name: repo typecheck
        entry: make typecheck
        language: system
        pass_filenames: false
