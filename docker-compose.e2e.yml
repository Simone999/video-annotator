# Shared SQLite volume only. Docker E2E does not add a separate DB service.
services:
  backend-init:
    build:
      context: .
      dockerfile: backend/Dockerfile.e2e
    command: ["./scripts/docker_e2e_init.sh"]
    restart: "no"
    env_file:
      - ./.env.docker-e2e
    volumes:
      - video-annotator-e2e-state:/var/lib/video-annotator-e2e

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.e2e
    env_file:
      - ./.env.docker-e2e
    depends_on:
      backend-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD-SHELL
        - python -c 'from urllib.request import urlopen; import os, sys; port = os.environ["BACKEND_PORT"]; sys.exit(0 if urlopen(f"http://127.0.0.1:{port}/openapi.json").status == 200 else 1)'
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
    volumes:
      - video-annotator-e2e-state:/var/lib/video-annotator-e2e

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.e2e
    env_file:
      - ./.env.docker-e2e
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - node -e 'const port = process.env.FRONTEND_PORT; fetch(`http://127.0.0.1:${port}`).then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))'
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-noble
    profiles:
      - runner
    working_dir: /workdir
    environment:
      PLAYWRIGHT_RUN_MODE: docker
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    command:
      - bash
      - -lc
      - echo "Playwright Docker mode wiring lands in US-013"
    volumes:
      - .:/workdir

volumes:
  video-annotator-e2e-state:
